<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Pokémon Game</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    overflow: hidden;
    background: #222;
    color: white;
}

/* WORLD */
#world {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #7ec850;
}

.grass {
    position: absolute;
    width: 100px;
    height: 100px;
    background: #4caf50;
}

#player {
    position: absolute;
    width: 40px;
    height: 40px;
    background: yellow;
    border-radius: 50%;
}

/* BATTLE */
#battle {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(#87CEEB, #fff);
}

.enemy, .ally {
    position: absolute;
    bottom: 150px;
    width: 120px;
}

.enemy { right: 50px; }
.ally { left: 50px; }

/* HP */
.hpbox {
    position: absolute;
    top: 20px;
    width: 200px;
}

#enemyHPBox { right: 20px; }
#playerHPBox { left: 20px; }

.bar {
    height: 15px;
    background: red;
}

.fill {
    height: 100%;
    background: lime;
}

/* UI */
#text {
    position: absolute;
    bottom: 120px;
    width: 100%;
    text-align: center;
}

.controls {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

/* MOBILE MOVE */
#moveBtns {
    position: absolute;
    bottom: 100px;
    left: 10px;
}

</style>
</head>

<body>

<!-- WORLD -->
<div id="world">
    <div id="player"></div>

    <!-- grass patches -->
    <div class="grass" style="left:200px; top:200px;"></div>
    <div class="grass" style="left:400px; top:300px;"></div>
    <div class="grass" style="left:600px; top:150px;"></div>
</div>

<!-- BATTLE -->
<div id="battle">
    <img class="ally" src="https://media.giphy.com/media/nA8oZCq2tPbl6/giphy.gif">
    <img class="enemy" src="https://media.giphy.com/media/DRfu7BT8ZK1uo/giphy.gif">

    <div id="playerHPBox" class="hpbox">
        Player
        <div class="bar"><div id="pHP" class="fill"></div></div>
    </div>

    <div id="enemyHPBox" class="hpbox">
        Enemy
        <div class="bar"><div id="eHP" class="fill"></div></div>
    </div>

    <div id="text">A wild Pokémon appeared!</div>

    <div class="controls">
        <button onclick="attack()">⚡ Attack</button>
        <button onclick="catchPoke()">🎯 Catch</button>
        <button onclick="run()">🏃 Run</button>
    </div>
</div>

<!-- MOBILE MOVE -->
<div id="moveBtns">
    <button onclick="move(0,-20)">⬆️</button><br>
    <button onclick="move(-20,0)">⬅️</button>
    <button onclick="move(20,0)">➡️</button><br>
    <button onclick="move(0,20)">⬇️</button>
</div>

<script>
let player = document.getElementById("player");
let world = document.getElementById("world");
let battle = document.getElementById("battle");

let px = 50, py = 50;

let inBattle = false;
let playerHP = 100;
let enemyHP = 100;
let pokeballs = 5;

function draw() {
    player.style.left = px + "px";
    player.style.top = py + "px";
}
draw();

/* MOVEMENT */
document.addEventListener("keydown", e => {
    if (inBattle) return;

    if (e.key === "ArrowUp") move(0,-20);
    if (e.key === "ArrowDown") move(0,20);
    if (e.key === "ArrowLeft") move(-20,0);
    if (e.key === "ArrowRight") move(20,0);
});

function move(dx, dy) {
    if (inBattle) return;

    px += dx;
    py += dy;
    draw();

    checkGrass();
}

/* RANDOM ENCOUNTER */
function checkGrass() {
    let chance = Math.random();
    if (chance < 0.1) startBattle();
}

/* START BATTLE */
function startBattle() {
    inBattle = true;
    world.style.display = "none";
    battle.style.display = "block";

    playerHP = 100;
    enemyHP = 100;
    updateHP();
}

/* UPDATE HP */
function updateHP() {
    document.getElementById("pHP").style.width = playerHP + "%";
    document.getElementById("eHP").style.width = enemyHP + "%";
}

/* ATTACK */
function attack() {
    let dmg = rand(10,20);
    enemyHP -= dmg;
    text.innerText = "You hit -" + dmg;

    if (enemyHP <= 0) return win();

    enemyTurn();
    updateHP();
}

/* ENEMY TURN */
function enemyTurn() {
    let dmg = rand(5,15);
    playerHP -= dmg;
    text.innerText += " | Enemy -" + dmg;

    if (playerHP <= 0) lose();
}

/* CATCH */
function catchPoke() {
    if (pokeballs <= 0) {
        text.innerText = "No Pokéballs!";
        return;
    }

    pokeballs--;

    let chance = 100 - enemyHP;

    if (rand(0,100) < chance) {
        text.innerText = "Caught! 🎉";
        setTimeout(endBattle, 1000);
    } else {
        text.innerText = "Broke free!";
        enemyTurn();
    }
}

/* RUN */
function run() {
    text.innerText = "Got away!";
    setTimeout(endBattle, 1000);
}

/* WIN/LOSE */
function win() {
    text.innerText = "You win! 🎉";
    setTimeout(endBattle, 1000);
}

function lose() {
    text.innerText = "You lost 😢";
    setTimeout(endBattle, 1000);
}

/* END BATTLE */
function endBattle() {
    inBattle = false;
    battle.style.display = "none";
    world.style.display = "block";
}

/* RANDOM */
function rand(a,b) {
    return Math.floor(Math.random()*(b-a+1))+a;
}
</script>

</body>
</html>
